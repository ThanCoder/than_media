# Run with `dart run ffigen --config ffigen.yaml`.
name: ThanMediaBindings
description: |
  Bindings for `native_src/src/ffi_wrapper.h`.

  Regenerate bindings with `dart run ffigen --config ffigen.yaml`.
output: "lib/than_media_bindings_generated.dart"
headers:
  entry-points:
    - "src/ffi/ffi_wrapper.h"
    - "src/include/stb_image_write.h"
    - "src/include/miniaudio.h"
  include-directives:
    - "src/ffi/ffi_wrapper.h"
    - "src/include/stb_image_write.h"
    - "src/include/miniaudio.h"

ffi-native:
comments:
  style: any
  length: full

# ignore-source-errors: true
compiler-opts:
  - "-I/home/thancoder/projects/flutter_ffi_projects/than_media/native_src"
